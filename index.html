<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #fff; /* Start with friendly white */
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            transition: background-color 0.5s;
        }

        .hidden { display: none !important; }
        .no-cursor { cursor: none !important; }

        /* --- Friendly UI --- */
        #friendly-ui { text-align: center; color: #333; }
        
        #start-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.5rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        #start-btn:hover { transform: scale(1.05); }

        .smiley { font-size: 3rem; margin-top: 20px; display: block; }

        /* --- Calm Analyzing UI --- */
        #analysis-ui { text-align: center; color: #333; }
        
        .calm-loader {
            width: 40px; height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- Hacked State --- */
        .hacked-bg { background-color: #000 !important; color: #ff3333 !important; font-family: 'Share Tech Mono', monospace !important; }

        .hacked-text {
            font-size: 5rem;
            text-shadow: 2px 0 #0ff, -2px 0 #f0f;
            animation: light-glitch 3s infinite;
        }

        @keyframes light-glitch {
            0%, 95% { transform: translate(0); }
            96% { transform: translate(-5px, 2px); }
            97% { transform: translate(5px, -2px); }
            98% { transform: translate(-2px, -1px); }
        }

        /* --- Windows Shutdown UI --- */
        #shutdown-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 500;
        }

        .win-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        /* --- BSOD --- */
        #bsod {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0078d7; color: white; padding: 10%; z-index: 400;
            text-align: left; font-family: sans-serif;
        }
    </style>
</head>
<body>

    <!-- Stage 1: Friendly -->
    <div id="friendly-ui">
        <button id="start-btn">Click me</button>
        <span class="smiley">:)</span>
    </div>

    <!-- Stage 2: Calm Analysis -->
    <div id="analysis-ui" class="hidden">
        <div class="calm-loader"></div>
        <h1>Analyzing...</h1>
    </div>

    <!-- Stage 3: Hacked (Dynamically styled via JS) -->
    <div id="hacked-ui" class="hidden">
        <h1 class="hacked-text">HACKED!</h1>
    </div>

    <!-- Stage 4: BSOD -->
    <div id="bsod" class="hidden">
        <div style="font-size: 80px;">:(</div>
        <h2 style="font-weight: normal; font-size: 2rem;">Your PC ran into a problem and needs to restart.</h2>
        <p style="margin-top: 40px;">Stop Code: SYSTEM_THREAD_EXCEPTION_NOT_HANDLED</p>
    </div>

    <!-- Stage 5: Shutdown -->
    <div id="shutdown-ui" class="hidden">
        <div class="win-spinner"></div>
        <h2 style="font-family: sans-serif; font-weight: 300;">Shutting down</h2>
    </div>

    <!-- Final Blackout -->
    <div id="blackout" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:1000;"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const friendlyUI = document.getElementById('friendly-ui');
        const analysisUI = document.getElementById('analysis-ui');
        const hackedUI = document.getElementById('hacked-ui');
        const shutdownUI = document.getElementById('shutdown-ui');
        const bsod = document.getElementById('bsod');
        const blackout = document.getElementById('blackout');

        startBtn.addEventListener('click', () => {
            // Go Fullscreen
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            
            // Mouse disappears
            document.body.classList.add('no-cursor');
            
            // Switch to Calm Analysis
            friendlyUI.classList.add('hidden');
            analysisUI.classList.remove('hidden');

            // 1. Stay calm for 4 seconds
            setTimeout(() => {
                triggerHack();
            }, 4000);
        });

        function triggerHack() {
            // Visual shift to Hacked
            analysisUI.classList.add('hidden');
            hackedUI.classList.remove('hidden');
            document.body.classList.add('hacked-bg');

            // 2. Stay on Hacked for 9 seconds
            setTimeout(() => {
                hackedUI.classList.add('hidden');
                bsod.classList.remove('hidden');
                
                // 3. Show BSOD for 3 seconds
                setTimeout(() => {
                    bsod.classList.add('hidden');
                    shutdownUI.classList.remove('hidden');
                    document.body.style.backgroundColor = "#000";

                    // 4. Final Blackout after 4 seconds
                    setTimeout(() => {
                        shutdownUI.classList.add('hidden');
                        blackout.classList.remove('hidden');
                    }, 4000);
                }, 3000); 

            }, 9000);
        }
    </script>
</body>
</html>
