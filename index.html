<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Diagnostic Tool</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
            display: flex; justify-content: center; align-items: center;
            color: #0f0;
        }

        .hidden { display: none !important; }
        .no-cursor { cursor: none !important; }

        /* --- Analysis UI --- */
        #analysis-ui { text-align: center; z-index: 10; width: 80%; }
        
        .sys-info {
            text-align: left;
            font-size: 0.9rem;
            color: #0a0;
            margin-bottom: 20px;
            border-left: 2px solid #0f0;
            padding-left: 15px;
            display: inline-block;
        }

        .loader-bar {
            width: 100%; max-width: 400px;
            height: 4px; background: #111;
            margin: 20px auto; border: 1px solid #0f0;
        }

        #progress-fill { width: 0%; height: 100%; background: #0f0; }

        /* --- Broken Screen Glitch --- */
        #glitch-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; display: none;
            background: radial-gradient(circle, transparent 70%, rgba(0,0,0,0.8) 100%);
        }

        .crack {
            position: absolute; background: rgba(255,255,255,0.15);
            box-shadow: 0 0 5px rgba(0,255,255,0.3); z-index: 101;
        }

        /* --- Hacked Text --- */
        .hacked-text {
            color: #ff3333; font-size: 4rem;
            text-shadow: 2px 0 #0ff, -2px 0 #f0f;
            animation: light-glitch 3s infinite;
        }

        @keyframes light-glitch {
            0%, 95%, 100% { transform: translate(0); opacity: 1; }
            96% { transform: translate(-4px, 2px); opacity: 0.8; }
            97% { transform: translate(4px, -2px); opacity: 0.9; }
            98% { transform: translate(-2px, -1px); }
        }

        /* --- Windows Shutdown UI --- */
        #shutdown-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 500;
        }

        .win-spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- BSOD --- */
        #bsod {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0078d7; color: white; padding: 10%; z-index: 400;
        }

        #start-btn {
            padding: 15px 40px; background: transparent; color: #0f0;
            border: 1px solid #0f0; font-size: 1.2rem; cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
        }
    </style>
</head>
<body>

    <button id="start-btn">RUN HARDWARE DIAGNOSTIC</button>

    <div id="analysis-ui" class="hidden">
        <div class="sys-info" id="device-data">
            DETECTING HARDWARE...<br>
            IP_STUB: 192.168.1.{{Math.floor(Math.random()*255)}}
        </div>
        <h1 id="status-text">ANALYZING DRIVE C:...</h1>
        <div class="loader-bar"><div id="progress-fill"></div></div>
        <p id="percent-text">0%</p>
    </div>

    <div id="bsod" class="hidden">
        <div style="font-size: 80px;">:(</div>
        <h2 style="font-weight: normal;">Your PC ran into a problem and needs to restart.</h2>
        <p>Stop Code: MEMORY_MANAGEMENT_ERROR</p>
    </div>

    <div id="shutdown-ui" class="hidden">
        <div class="win-spinner"></div>
        <h2 style="font-family: sans-serif; font-weight: 300;">Shutting down</h2>
    </div>

    <div id="glitch-overlay"></div>
    <div id="blackout" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:1000;"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const analysisUI = document.getElementById('analysis-ui');
        const deviceData = document.getElementById('device-data');
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');
        const percentText = document.getElementById('percent-text');
        const glitchOverlay = document.getElementById('glitch-overlay');
        const shutdownUI = document.getElementById('shutdown-ui');
        const bsod = document.getElementById('bsod');
        const blackout = document.getElementById('blackout');

        // Identify User Device Info
        function getSpecs() {
            const ua = navigator.userAgent;
            let os = "Unknown OS";
            if (ua.indexOf("Win") != -1) os = "Windows X64";
            if (ua.indexOf("Mac") != -1) os = "MacOS / Darwin";
            if (ua.indexOf("Linux") != -1) os = "Linux / Ubuntu";
            if (ua.indexOf("Android") != -1) os = "Android OS";
            if (ua.indexOf("like Mac") != -1) os = "iOS Device";

            return `
                TARGET_OS: ${os}<br>
                RESOLUTION: ${window.screen.width}x${window.screen.height}<br>
                BROWSER_KERNAL: ${navigator.vendor}<br>
                CORES: ${navigator.hardwareConcurrency || '8'} THREADS
            `;
        }

        function createCracks() {
            for(let i=0; i<8; i++) {
                let crack = document.createElement('div');
                crack.className = 'crack';
                crack.style.width = Math.random() * 500 + 'px';
                crack.style.height = '1px';
                crack.style.top = Math.random() * 100 + '%';
                crack.style.left = Math.random() * 100 + '%';
                crack.style.transform = `rotate(${Math.random() * 360}deg)`;
                glitchOverlay.appendChild(crack);
            }
        }

        startBtn.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            document.body.classList.add('no-cursor');
            startBtn.classList.add('hidden');
            analysisUI.classList.remove('hidden');
            deviceData.innerHTML = getSpecs();

            let progress = 0;
            let interval = setInterval(() => {
                progress += Math.random() * 1.5;
                if (progress >= 74) { // Break at 74%
                    clearInterval(interval);
                    triggerHack();
                }
                progressFill.style.width = progress + '%';
                percentText.innerText = Math.floor(progress) + '%';
            }, 60);
        });

        function triggerHack() {
            statusText.innerText = "YOU ARE HACKED";
            statusText.className = "hacked-text";
            glitchOverlay.style.display = 'block';
            createCracks();

            // 9 seconds of the hacked message
            setTimeout(() => {
                analysisUI.classList.add('hidden');
                glitchOverlay.style.display = 'none';
                bsod.classList.remove('hidden');
                
                // Show BSOD for 3 seconds, then "Shutting down"
                setTimeout(() => {
                    bsod.classList.add('hidden');
                    shutdownUI.classList.remove('hidden');

                    // Final Blackout after 4 seconds
                    setTimeout(() => {
                        shutdownUI.classList.add('hidden');
                        blackout.classList.remove('hidden');
                    }, 4000);
                }, 3000); 

            }, 9000);
        }
    </script>
</body>
</html>
