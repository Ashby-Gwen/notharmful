<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0f0;
            cursor: default; /* Mouse enabled for the button */
        }

        .hidden { display: none !important; }
        .no-cursor { cursor: none !important; }

        /* --- Analysis UI --- */
        #analysis-ui {
            text-align: center;
            z-index: 10;
        }

        .loader-bar {
            width: 300px;
            height: 4px;
            background: #111;
            margin: 20px auto;
            position: relative;
            border: 1px solid #0f0;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: #0f0;
            transition: width 0.2s linear;
        }

        /* --- Broken Screen Glitch --- */
        #glitch-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.1), rgba(0,0,0,0.1) 1px, transparent 1px, transparent 2px);
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        .screen-crack {
            position: absolute;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        /* --- Text Styles --- */
        .hacked-text {
            color: #ff3333;
            font-size: 5rem;
            text-shadow: 2px 0 #0ff, -2px 0 #f0f;
            animation: light-glitch 2s infinite;
        }

        @keyframes light-glitch {
            0% { transform: translate(0); }
            1% { transform: translate(-2px, 1px); }
            2% { transform: translate(2px, -1px); }
            3% { transform: translate(0); }
        }

        /* --- Shutdown UI --- */
        #shutdown-ui {
            text-align: center;
            color: white;
            z-index: 200;
        }

        #start-btn {
            padding: 15px 40px;
            background: transparent;
            color: #0f0;
            border: 1px solid #0f0;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
        }

        #bsod {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0078d7;
            color: white;
            padding: 10%;
            box-sizing: border-box;
            z-index: 300;
        }
    </style>
</head>
<body>

    <button id="start-btn">CHECK FOR UPDATES</button>

    <!-- UI Stages -->
    <div id="analysis-ui" class="hidden">
        <h1 id="status-text">ANALYZING SYSTEM...</h1>
        <div class="loader-bar"><div id="progress-fill"></div></div>
        <p id="percent-text">0%</p>
    </div>

    <div id="shutdown-ui" class="hidden">
        <img src="https://upload.wikimedia.org/wikipedia/commons/4/4b/Windows_10_Settings_Icon.svg" width="50" style="filter: invert(1); margin-bottom: 20px;">
        <h2>Shutting down...</h2>
        <p>Closing apps and stopping background tasks.</p>
    </div>

    <div id="bsod" class="hidden">
        <div style="font-size: 100px;">:(</div>
        <p style="font-size: 24px;">Your PC ran into a problem and needs to restart.</p>
        <p>Stop Code: SYSTEM_SERVICE_EXCEPTION</p>
    </div>

    <div id="glitch-overlay"></div>
    <div id="blackout" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:1000;"></div>

    <script>
        const startBtn = document.getElementById('start-btn');
        const analysisUI = document.getElementById('analysis-ui');
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');
        const percentText = document.getElementById('percent-text');
        const glitchOverlay = document.getElementById('glitch-overlay');
        const shutdownUI = document.getElementById('shutdown-ui');
        const bsod = document.getElementById('bsod');
        const blackout = document.getElementById('blackout');

        function createCracks() {
            for(let i=0; i<5; i++) {
                let crack = document.createElement('div');
                crack.className = 'screen-crack';
                crack.style.width = Math.random() * 400 + 'px';
                crack.style.height = '1px';
                crack.style.top = Math.random() * 100 + '%';
                crack.style.left = Math.random() * 100 + '%';
                crack.style.transform = `rotate(${Math.random() * 360}deg)`;
                glitchOverlay.appendChild(crack);
            }
        }

        startBtn.addEventListener('click', () => {
            // Enter Fullscreen & Disable Mouse
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            document.body.classList.add('no-cursor');
            startBtn.classList.add('hidden');
            analysisUI.classList.remove('hidden');

            // 1. Progress Bar Logic
            let progress = 0;
            let interval = setInterval(() => {
                progress += Math.random() * 2;
                if (progress >= 82) { // Fail at 82%
                    clearInterval(interval);
                    triggerHack();
                }
                progressFill.style.width = progress + '%';
                percentText.innerText = Math.floor(progress) + '%';
            }, 50);
        });

        function triggerHack() {
            // Change text and add subtle glitch
            statusText.innerText = "YOU ARE HACKED";
            statusText.className = "hacked-text";
            glitchOverlay.style.display = 'block';
            createCracks();

            // 2. Wait 9 seconds after "Hacked", then show BSOD
            setTimeout(() => {
                analysisUI.classList.add('hidden');
                bsod.classList.remove('hidden');
                
                // 3. Stay on BSOD briefly, then go to Shutdown
                setTimeout(() => {
                    bsod.classList.add('hidden');
                    shutdownUI.classList.remove('hidden');
                    document.body.style.backgroundColor = "#000";

                    // 4. Final Blackout after 4 seconds
                    setTimeout(() => {
                        shutdownUI.classList.add('hidden');
                        blackout.classList.remove('hidden');
                    }, 4000);
                }, 3000); 

            }, 9000);
        }
    </script>
</body>
</html>
