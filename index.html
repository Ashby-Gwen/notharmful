<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Diagnostic</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0f0;
        }

        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            opacity: 0.3; /* Subtle during analysis */
            transition: opacity 0.5s;
        }

        #main-ui {
            display: none;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        /* Calm Loading State */
        .loader {
            border: 2px solid #0f0;
            border-top: 2px solid transparent;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .status-text {
            font-size: 2rem;
            letter-spacing: 2px;
        }

        /* Aggressive Glitch (Applied only after 3s) */
        .glitch-mode {
            color: #ff0000 !important;
            font-size: 6rem !important;
            animation: aggressive-glitch 0.1s infinite;
            text-shadow: 2px 2px #00ffff, -2px -2px #ff00ff;
        }

        @keyframes aggressive-glitch {
            0% { transform: translate(2px, -2px); }
            25% { transform: translate(-2px, 2px) scale(1.05); }
            50% { transform: translate(5px, 0px) skewX(20deg); }
            75% { transform: translate(-5px, -1px) skewX(-20deg); }
            100% { transform: translate(0); }
        }

        #start-btn {
            z-index: 100;
            padding: 15px 30px;
            background: #000;
            color: #0f0;
            border: 1px solid #0f0;
            font-size: 1.2rem;
            cursor: pointer;
            font-family: 'Share Tech Mono', monospace;
            transition: 0.3s;
        }

        #start-btn:hover { background: #0f0; color: #000; }

        #bsod {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0078d7;
            color: white;
            padding: 10%;
            z-index: 1000;
            box-sizing: border-box;
        }

        #blackout {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <button id="start-btn">BEGIN SYSTEM CHECK</button>

    <canvas id="matrix-canvas"></canvas>

    <div id="main-ui">
        <div id="loader-icon" class="loader"></div>
        <h1 class="status-text" id="status-msg">ANALYZING SYSTEM...</h1>
    </div>

    <div id="bsod">
        <div style="font-size: 100px;">:(</div>
        <p style="font-size: 24px; max-width: 800px;">
            Your device ran into a problem and needs to restart. We're just collecting some error info, and then we'll restart for you.
        </p>
        <p style="font-size: 18px;">0% complete</p>
    </div>

    <div id="blackout"></div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const mainUI = document.getElementById('main-ui');
        const statusMsg = document.getElementById('status-msg');
        const loader = document.getElementById('loader-icon');
        const bsod = document.getElementById('bsod');
        const blackout = document.getElementById('blackout');

        canvas.height = window.innerHeight;
        canvas.width = window.innerWidth;
        const chars = "0101010101010101"; // Matrix numbers
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }

        startBtn.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            
            startBtn.style.display = 'none';
            mainUI.style.display = 'block';
            let matrixInterval = setInterval(drawMatrix, 50);

            // Timeline
            // 1. After 3 seconds, trigger the Hack Glitch
            setTimeout(() => {
                loader.style.display = 'none';
                canvas.style.opacity = "1"; // Intensify matrix
                statusMsg.innerText = "YOU ARE HACKED";
                statusMsg.classList.add('glitch-mode');
            }, 3000);

            // 2. 9 seconds after "Hacked" (Total 12s), BSOD
            setTimeout(() => {
                clearInterval(matrixInterval);
                mainUI.style.display = 'none';
                bsod.style.display = 'block';
            }, 12000);

            // 3. 4 seconds after BSOD, Blackout
            setTimeout(() => {
                bsod.style.display = 'none';
                blackout.style.display = 'block';
            }, 16000);
        });
    </script>
</body>
</html>
