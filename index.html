<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: white;
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Initial Button Style */
        #init-btn {
            padding: 15px 30px;
            background: transparent;
            border: 2px solid #333;
            color: #333;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
        }
        #init-btn:hover { border-color: #fff; color: #fff; }

        /* Glitch Background Effect */
        .glitch-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: -1;
            background: url('https://media.giphy.com/media/o0vwzuFwCGAFO/giphy.gif'); /* Static/Glitch gif */
            background-size: cover;
            opacity: 0.2;
        }

        /* Message Style */
        #message {
            display: none;
            font-size: 5rem;
            text-transform: uppercase;
            text-align: center;
            z-index: 10;
            color: #0f0;
            text-shadow: 2px 2px #ff0000;
        }

        /* Blue Screen of Death */
        #bsod {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0078d7;
            color: white;
            padding: 50px;
            display: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            z-index: 100;
        }

        .bsod-content { font-size: 1.5rem; max-width: 800px; }
        .qr-code { width: 150px; height: 150px; background: white; margin-top: 20px; }
    </style>
</head>
<body>

    <button id="init-btn">INITIALIZE SYSTEM</button>

    <div class="glitch-bg" id="glitch"></div>
    <div id="message">YOU ARE HACKED</div>

    <div id="bsod">
        <div class="bsod-content">
            <span style="font-size: 8rem;">:(</span><br><br>
            <p>Your PC ran into a problem and needs to restart. We're just collecting some error info, and then we'll restart for you.</p>
            <p>100% complete</p>
            <div class="qr-code"></div>
            <p style="font-size: 1rem;">Stop Code: CRITICAL_PROCESS_DIED</p>
        </div>
    </div>

    <script>
        const btn = document.getElementById('init-btn');
        const glitch = document.getElementById('glitch');
        const msg = document.getElementById('message');
        const bsod = document.getElementById('bsod');

        btn.addEventListener('click', () => {
            // Go Fullscreen
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
            
            btn.style.display = 'none';

            // Sequence
            // 1. Calm for 4 seconds, then glitch + message
            setTimeout(() => {
                glitch.style.display = 'block';
                msg.style.display = 'block';
            }, 4000);

            // 2. Show BSOD after 9 seconds of the message (13 seconds total)
            setTimeout(() => {
                bsod.style.display = 'block';
            }, 13000);

            // 3. Go Black after 4 seconds of BSOD (17 seconds total)
            setTimeout(() => {
                bsod.style.backgroundColor = 'black';
                bsod.innerHTML = ''; // Clear content
            }, 17000);
        });
    </script>
</body>
</html>
