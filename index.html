<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #fff;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
        }

        .hidden { display: none !important; }
        .no-cursor { cursor: none !important; }

        /* Stage 1: Friendly */
        #friendly-ui { text-align: center; color: #333; }
        #start-btn {
            background: #4CAF50; color: white; border: none;
            padding: 15px 40px; font-size: 1.5rem; border-radius: 50px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Stage 2: Calm Analysis */
        .calm-loader {
            width: 40px; height: 40px; border: 3px solid #f3f3f3;
            border-top: 3px solid #4CAF50; border-radius: 50%;
            animation: spin 2s linear infinite; margin: 0 auto 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Stage 3: Hacked */
        .hacked-bg { background-color: #000 !important; color: #ff3333 !important; font-family: 'Share Tech Mono', monospace !important; }
        .hacked-text {
            font-size: 5rem; text-shadow: 2px 0 #0ff, -2px 0 #f0f;
            animation: light-glitch 3s infinite;
        }
        @keyframes light-glitch {
            0%, 95% { transform: translate(0); }
            96% { transform: translate(-5px, 2px); }
            97% { transform: translate(5px, -2px); }
        }

        /* Stage 4: BSOD */
        #bsod {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0078d7; color: white; padding: 10%; z-index: 400;
        }

        /* Stage 5: Shutdown */
        #shutdown-ui {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 500;
        }

        /* Stage 6: Prank Reveal (Fading in) */
        #prank-reveal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; color: #d63384; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; transition: opacity 2s;
        }

        /* Typing Effect */
        .typing-text {
            font-size: 2.5rem;
            white-space: nowrap;
            overflow: hidden;
            border-right: 3px solid #d63384;
            width: 0;
            animation: typing 3s steps(40) forwards, blink 0.7s infinite;
        }

        @keyframes typing { from { width: 0; } to { width: 100%; } }
        @keyframes blink { 50% { border-color: transparent; } }

        /* Bubbly Hearts */
        .heart {
            position: absolute;
            font-size: 2rem;
            animation: bubble-up 4s ease-in forwards;
            pointer-events: none;
        }

        @keyframes bubble-up {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            20% { opacity: 1; transform: translateY(80vh) scale(1.2); }
            100% { transform: translateY(-10vh) scale(1); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="friendly-ui">
        <button id="start-btn">Click me</button>
        <span style="font-size: 3rem; display: block; margin-top: 10px;">:)</span>
    </div>

    <div id="analysis-ui" class="hidden">
        <div class="calm-loader"></div>
        <h1>Analyzing...</h1>
    </div>

    <div id="hacked-ui" class="hidden">
        <h1 class="hacked-text">HACKED!</h1>
    </div>

    <div id="bsod" class="hidden">
        <div style="font-size: 80px;">:(</div>
        <h2>Your PC ran into a problem and needs to restart.</h2>
    </div>

    <div id="shutdown-ui" class="hidden">
        <div class="win-spinner"></div>
        <h2 style="font-family: sans-serif;">Shutting down</h2>
    </div>

    <div id="blackout" class="hidden" style="position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:1000;"></div>

    <div id="prank-reveal" class="hidden">
        <div style="width: fit-content;">
            <h1 class="typing-text">Izza Prank lang guys.. ingat sa pagclick</h1>
        </div>
        <div style="font-size: 5rem; margin-top: 20px;">❤️</div>
    </div>

    <script>
        const stages = {
            btn: document.getElementById('start-btn'),
            friendly: document.getElementById('friendly-ui'),
            analysis: document.getElementById('analysis-ui'),
            hacked: document.getElementById('hacked-ui'),
            bsod: document.getElementById('bsod'),
            shutdown: document.getElementById('shutdown-ui'),
            blackout: document.getElementById('blackout'),
            reveal: document.getElementById('prank-reveal')
        };

        function createHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = ['❤️', '💖', '✨', '🌸'][Math.floor(Math.random() * 4)];
            heart.className = 'heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 2 + 3) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }

        stages.btn.addEventListener('click', () => {
            if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
            document.body.classList.add('no-cursor');
            
            stages.friendly.classList.add('hidden');
            stages.analysis.classList.remove('hidden');

            // 1. Calm Analysis (4s)
            setTimeout(() => {
                stages.analysis.classList.add('hidden');
                stages.hacked.classList.remove('hidden');
                document.body.classList.add('hacked-bg');

                // 2. Hacked (9s)
                setTimeout(() => {
                    stages.hacked.classList.add('hidden');
                    stages.bsod.classList.remove('hidden');

                    // 3. BSOD (3s)
                    setTimeout(() => {
                        stages.bsod.classList.add('hidden');
                        stages.shutdown.classList.remove('hidden');
                        document.body.style.backgroundColor = "#000";

                        // 4. Shutdown (4s)
                        setTimeout(() => {
                            stages.shutdown.classList.add('hidden');
                            stages.blackout.classList.remove('hidden');

                            // 5. Black Screen (5s) -> Fade to Prank Reveal
                            setTimeout(() => {
                                stages.reveal.classList.remove('hidden');
                                setTimeout(() => {
                                    stages.reveal.style.opacity = "1";
                                    document.body.classList.remove('no-cursor');
                                    setInterval(createHeart, 250);
                                }, 50);
                            }, 5000);

                        }, 4000);
                    }, 3000);
                }, 9000);
            }, 4000);
        });
    </script>
</body>
</html>
